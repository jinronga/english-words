<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body class="{% if page.home %}is-home{% else %}is-doc{% endif %}">
  <div class="site-shell">
    <header class="topbar">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="返回首页">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation">
            <path d="M6 5.5h8.5a3 3 0 0 1 3 3V19H9a3 3 0 0 0-3-3z" fill="none" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8.5 8.5h8m-8 3h8m-8 3h5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="brand-text">
          <strong>{{ site.title }}</strong>
          <small>人教版小学、初中、高中英语词表</small>
        </span>
      </a>
      <nav class="topnav" aria-label="主导航">
        <a class="{% if page.url contains '/小学/' %}is-active{% endif %}" href="{{ '/小学/' | relative_url }}">小学</a>
        <a class="{% if page.url contains '/初中/' %}is-active{% endif %}" href="{{ '/初中/' | relative_url }}">初中</a>
        <a class="{% if page.url contains '/高中/' %}is-active{% endif %}" href="{{ '/高中/' | relative_url }}">高中</a>
        <a href="{{ '/#vocab-search' | relative_url }}">搜索</a>
      </nav>
    </header>

    <main class="page-main{% if page.home %} page-main-home{% endif %}">
      <article class="page-copy markdown-body{% if page.home %} home-copy{% endif %}">
        {{ content }}
      </article>
    </main>

    <footer class="site-footer">
      <span>英语单词整理</span>
      <span>GitHub Pages · Jekyll</span>
      <span>仅供学习交流</span>
    </footer>
  </div>
  <script src="{{ '/assets/js/home.js' | relative_url }}" defer></script>
</body>
</html>
